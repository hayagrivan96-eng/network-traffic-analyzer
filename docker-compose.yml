version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ngp_db
    restart: always
    environment:
      POSTGRES_DB: network_guardian
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ngp_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgrespassword123@db:5432/network_guardian
      - PORT=8000
      - HOST=0.0.0.0
      - DEBUG=True
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ngp_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
